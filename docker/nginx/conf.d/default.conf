upstream frontend {
    server client:3000;
}

upstream backend {
    server server:3001;
}

server {
    listen 80;
    server_name marginalia.ruhanfreitas.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name marginalia.ruhanfreitas.app;

    ssl_certificate     /etc/letsencrypt/live/marginalia.ruhanfreitas.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marginalia.ruhanfreitas.app/privkey.pem;

    location / {
        proxy_pass http://frontend;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}